name: Deploy iOS to TestFlight

on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Restore signing files
        run: |
          echo "${{ secrets.IOS_DISTRIBUTION_CER_BASE64 }}" | base64 --decode > distribution.cer
          echo "${{ secrets.IOS_DISTRIBUTION_PRIVATE_KEY_BASE64 }}" | base64 --decode > ios_distribution.key
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision

          openssl x509 -in distribution.cer -inform DER -out distribution.pem -outform PEM
          openssl pkcs12 -export \
            -out ios_distribution.p12 \
            -inkey ios_distribution.key \
            -in distribution.pem \
            -password pass:${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install certificate and profile
        run: |
          security create-keychain -p "build_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build_password" build.keychain
          security import ios_distribution.p12 \
            -k build.keychain \
            -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "build_password" \
            build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: flutter build ipa --release

      - name: Upload to TestFlight
        run: |
          mkdir -p private_keys
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" > private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
