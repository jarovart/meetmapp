name: Deploy iOS to TestFlight

on:
  workflow_dispatch:

jobs:
  deploy-ios:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare iOS project
        run: |
          flutter pub get
          cd ios
          pod install
          cd ..

      - name: Decode signing files
        run: |
          echo "${{ secrets.IOS_DISTRIBUTION_CER_BASE64 }}" | base64 --decode > distribution.cer
          echo "${{ secrets.IOS_DISTRIBUTION_PRIVATE_KEY_BASE64 }}" | base64 --decode > ios_distribution.key
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision

      - name: Create p12 certificate
        run: |
          openssl x509 \
            -in distribution.cer \
            -inform DER \
            -out distribution.pem \
            -outform PEM

          openssl pkcs12 -export \
            -out ios_distribution.p12 \
            -inkey ios_distribution.key \
            -in distribution.pem \
            -password pass:${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install certificate into temporary keychain
        run: |
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          security import ios_distribution.p12 \
            -k build.keychain \
            -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${{ secrets.KEYCHAIN_PASSWORD }}" \
            build.keychain

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Configure Runner signing
        run: |
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
      
          echo "Profile UUID: $PROFILE_UUID"
          echo "Profile Name: $PROFILE_NAME"
      
          perl -0pi -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          perl -0pi -e 's/DEVELOPMENT_TEAM = [A-Z0-9]+;/DEVELOPMENT_TEAM = ${{ secrets.IOS_TEAM }};/g' ios/Runner.xcodeproj/project.pbxproj
          perl -0pi -e 's/PROVISIONING_PROFILE_SPECIFIER = .*?;/PROVISIONING_PROFILE_SPECIFIER = "'"$PROFILE_NAME"'";/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Show Runner signing config
        run: |
          grep -n "CODE_SIGN_STYLE\|DEVELOPMENT_TEAM\|PROVISIONING_PROFILE_SPECIFIER\|PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj

      - name: Show signing identities
        run: security find-identity -v -p codesigning

      - name: Flutter build iOS without codesign
        run: |
          flutter build ios --release --no-codesign
      
      - name: Archive iOS app
        run: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/archive/Runner.xcarchive
      
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath build/ios/ipa

      - name: Create App Store Connect API key file
        run: |
          mkdir -p private_keys
          printf '%s' "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" > private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Upload IPA to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
